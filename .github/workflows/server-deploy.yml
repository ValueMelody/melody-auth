name: server-deploy CI

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd server && npm ci

      - name: Build Server View
        run: cd server && npm run build

      - name: Uncomment wrangler.toml deploy config
        run: |
          grep -q '# id = "7d9be060a7bc48919251b37caa7e1fcd"' server/wrangler.toml && \
            sed -i '/^# \[\[kv_namespaces\]\]/,/^$/s/^# //' server/wrangler.toml || true
          grep -q '# database_id = "8dc67df2-771d-4e73-9c16-d04341b9740e"' server/wrangler.toml && \
            sed -i '/^# \[\[d1_databases\]\]/,/^$/s/^# //' server/wrangler.toml || true

      - name: Run Migration
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'server'
          command: | 
            d1 migrations apply melody-auth --remote
            deploy --minify src/index.tsx
